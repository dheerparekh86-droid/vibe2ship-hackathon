<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vibe2Ship Starter</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 640px; margin: 60px auto; padding: 0 20px; color: #1a1a1a; }
  h1 { font-size: 1.4rem; }
  textarea { width: 100%; min-height: 100px; padding: 10px; font-size: 1rem; box-sizing: border-box; }
  button { margin-top: 10px; padding: 10px 18px; font-size: 1rem; cursor: pointer; }
  #result { margin-top: 20px; padding: 14px; background: #f4f4f4; border-radius: 6px; white-space: pre-wrap; min-height: 40px; }
  .loading { opacity: 0.6; }
</style>
</head>
<body>
  <h1>Vibe2Ship Starter — Gemini Test UI</h1>
  <p>Type something below and hit submit. Swap this UI once you know your real task.</p>
  <textarea id="userInput" placeholder="Enter input here..."></textarea><br>
  <button onclick="submitInput()">Submit</button>
  <div id="result"></div>

<script>
async function submitInput() {
  const input = document.getElementById("userInput").value;
  const resultDiv = document.getElementById("result");
  resultDiv.textContent = "Thinking...";
  resultDiv.classList.add("loading");

  try {
    const res = await fetch("/api/process", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ input })
    });
    const data = await res.json();
    resultDiv.classList.remove("loading");
    resultDiv.textContent = data.result || data.error || "No response";
  } catch (err) {
    resultDiv.classList.remove("loading");
    resultDiv.textContent = "Error: " + err.message;
  }
}
</script>
</body>
</html>
