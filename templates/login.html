<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login · DeadlineAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }
        
        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: 'Inter', sans-serif;
            background: #0B0B0F;
            color: #fff
        }
        
        .card {
            width: min(100%, 440px);
            background: #15161A;
            border: 1px solid #1e1e2a;
            border-radius: 20px;
            overflow: hidden
        }
        
        .card-top {
            background: #FF7A1A;
            padding: 32px 36px 28px;
            position: relative;
            overflow: hidden
        }
        
        .card-top::before {
            content: "";
            position: absolute;
            top: -40px;
            right: -40px;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08)
        }
        
        .card-top::after {
            content: "";
            position: absolute;
            bottom: -30px;
            left: 20px;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.08)
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            position: relative;
            z-index: 1
        }
        
        .logo-icon {
            width: 38px;
            height: 38px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px
        }
        
        .logo-name {
            font-size: 16px;
            font-weight: 700;
            color: #fff
        }
        
        .card-top h1 {
            font-size: 26px;
            font-weight: 700;
            color: #fff;
            position: relative;
            z-index: 1;
            line-height: 1.2
        }
        
        .card-top p {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.75);
            margin-top: 6px;
            position: relative;
            z-index: 1
        }
        
        .card-body {
            padding: 28px 36px 32px
        }
        
        .error {
            background: #1a0808;
            border: 1px solid #3a1212;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 13px;
            color: #E24B4A;
            margin-bottom: 18px
        }
        
        .field {
            margin-bottom: 16px
        }
        
        .field label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #888;
            margin-bottom: 7px;
            letter-spacing: .04em;
            text-transform: uppercase
        }
        
        .field input {
            width: 100%;
            height: 48px;
            background: #0f0f14;
            border: 1px solid #1e1e2a;
            border-radius: 10px;
            padding: 0 14px;
            color: #fff;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color .15s
        }
        
        .field input:focus {
            border-color: #FF7A1A
        }
        
        .field input::placeholder {
            color: #444
        }
        
        .submit {
            width: 100%;
            height: 50px;
            background: #FF7A1A;
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 6px;
            transition: all .15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px
        }
        
        .submit:hover {
            background: #e06a0f;
            transform: translateY(-1px)
        }
        
        .submit:active {
            transform: none
        }
        
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
            color: #333;
            font-size: 12px
        }
        
        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #1e1e2a
        }
        
        .guest-btn {
            width: 100%;
            height: 46px;
            background: transparent;
            border: 1px solid #1e1e2a;
            border-radius: 12px;
            color: #666;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all .15s
        }
        
        .guest-btn:hover {
            border-color: #FF7A1A;
            color: #FF7A1A
        }
        
        .footer-link {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #555
        }
        
        .footer-link a {
            color: #FF7A1A;
            text-decoration: none;
            font-weight: 600
        }
        
        .footer-link a:hover {
            text-decoration: underline
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="card-top">
            <div class="logo">
                <div class="logo-icon">⚡</div>
                <div class="logo-name">DeadlineAI</div>
            </div>
            <h1>Welcome back.</h1>
            <p>Log in to rescue your deadlines.</p>
        </div>
        <div class="card-body">
            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}

            <form method="post">
                <div class="field">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="you@example.com" required autocomplete="email">
                </div>
                <div class="field">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <button class="submit" type="submit">Log in →</button>
            </form>

            <div class="divider">or</div>

            <a href="/guest-login" style="text-decoration:none">
                <button class="guest-btn">Continue as Guest (no account needed)</button>
            </a>

            <div class="footer-link">
                No account? <a href="/register">Sign up free</a>
            </div>
        </div>
    </div>
</body>

</html>
