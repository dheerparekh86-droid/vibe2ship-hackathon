<aside style="width:220px;min-height:100vh;background:#0f0f14;border-right:1px solid #1e1e2a;display:flex;flex-direction:column;padding:20px 0;position:fixed;top:0;left:0;z-index:100">
  <div style="padding:0 20px 20px;border-bottom:1px solid #1e1e2a;margin-bottom:12px">
    <div style="display:flex;align-items:center;gap:10px">
      <div style="width:34px;height:34px;background:#FF7A1A;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px">⚡</div>
      <div>
        <div style="color:#fff;font-size:14px;font-weight:600">DeadlineAI</div>
        <div style="color:#555;font-size:11px">AI Companion</div>
      </div>
    </div>
  </div>

  <div style="padding:0 10px 12px;border-bottom:1px solid #1e1e2a;margin-bottom:12px">
    <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:#1a1a24;border-radius:8px">
      <div style="width:30px;height:30px;background:#FF7A1A;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff">{{ username[0].upper() }}</div>
      <div>
        <div style="color:#fff;font-size:12px;font-weight:500">{{ username }}</div>
        <div style="color:#555;font-size:11px">Free plan</div>
      </div>
    </div>
  </div>

  <div style="padding:0 10px;display:flex;flex-direction:column;gap:2px;flex:1">
    <a href="/" style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;text-decoration:none;font-size:13px;font-weight:500;transition:all 0.15s;{% if page == 'dashboard' %}background:#1a0f00;color:#FF7A1A;border-left:2px solid #FF7A1A;{% else %}color:#666;{% endif %}">
      <span style="font-size:16px">📊</span> Dashboard
    </a>
    <a href="/tasks" style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;text-decoration:none;font-size:13px;font-weight:500;transition:all 0.15s;{% if page == 'tasks' %}background:#1a0f00;color:#FF7A1A;border-left:2px solid #FF7A1A;{% else %}color:#666;{% endif %}">
      <span style="font-size:16px">✅</span> Tasks
    </a>
    <a href="/assistant" style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;text-decoration:none;font-size:13px;font-weight:500;transition:all 0.15s;{% if page == 'assistant' %}background:#1a0f00;color:#FF7A1A;border-left:2px solid #FF7A1A;{% else %}color:#666;{% endif %}">
      <span style="font-size:16px">🤖</span> AI Assistant
    </a>
    <a href="/calendar-view" style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;text-decoration:none;font-size:13px;font-weight:500;transition:all 0.15s;{% if page == 'calendar' %}background:#1a0f00;color:#FF7A1A;border-left:2px solid #FF7A1A;{% else %}color:#666;{% endif %}">
      <span style="font-size:16px">📅</span> Calendar
    </a>
    <a href="/analytics" style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;text-decoration:none;font-size:13px;font-weight:500;transition:all 0.15s;{% if page == 'analytics' %}background:#1a0f00;color:#FF7A1A;border-left:2px solid #FF7A1A;{% else %}color:#666;{% endif %}">
      <span style="font-size:16px">📈</span> Analytics
    </a>
  </div>

  <div style="padding:16px 20px;border-top:1px solid #1e1e2a">
    <div id="urgency-score" style="background:#1a0f00;border:1px solid #2a1500;border-radius:8px;padding:12px;margin-bottom:12px;display:none">
      <div style="color:#888;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Urgency Score</div>
      <div style="color:#FF7A1A;font-size:22px;font-weight:700" id="urgency-num">--</div>
      <div style="background:#1e1e2a;border-radius:4px;height:4px;margin-top:6px">
        <div id="urgency-bar" style="background:#FF7A1A;height:4px;border-radius:4px;width:0%;transition:width 0.5s"></div>
      </div>
    </div>
    <a href="/logout" style="display:flex;align-items:center;gap:8px;color:#555;font-size:12px;text-decoration:none">
      <span>🚪</span> Logout
    </a>
  </div>
</aside>

<script>
// Load urgency score from progress
async function loadUrgencyScore() {
  try {
    const r = await fetch('/api/tasks');
    const d = await r.json();
    if (d.progress && d.progress.total > 0) {
      const score = Math.round(((d.progress.total - d.progress.done) / d.progress.total) * 100);
      document.getElementById('urgency-score').style.display = 'block';
      document.getElementById('urgency-num').textContent = score;
      document.getElementById('urgency-bar').style.width = score + '%';
    }
  } catch(e) {}
}
loadUrgencyScore();
</script>
