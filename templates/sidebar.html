<aside style="width:220px;min-height:100vh;background:#0f0f14;border-right:1px solid #1e1e2a;display:flex;flex-direction:column;padding:20px 0;position:fixed;top:0;left:0;z-index:100">

    <!-- Logo -->
    <div style="padding:0 20px 20px;border-bottom:1px solid #1e1e2a;margin-bottom:12px">
        <div style="display:flex;align-items:center;gap:10px">
            <div style="width:36px;height:36px;background:#FF7A1A;border-radius:10px;display:flex;align-items:center;justify-content:center;color:white;font-size:18px;font-weight:bold">
                ⚡
            </div>
            <div>
                <div style="color:#fff;font-size:15px;font-weight:700">
                    DeadlineAI
                </div>
                <div style="color:#666;font-size:11px">
                    AI Companion
                </div>
            </div>
        </div>
    </div>

    <!-- Profile -->
    <div style="padding:0 12px 14px;border-bottom:1px solid #1e1e2a;margin-bottom:14px">
        <div style="display:flex;align-items:center;gap:10px;padding:10px;background:#191922;border-radius:10px">
            <div style="width:34px;height:34px;border-radius:50%;background:#FF7A1A;color:white;display:flex;align-items:center;justify-content:center;font-weight:700">
                {{ username[0]|upper }}
            </div>

            <div>
                <div style="color:white;font-size:13px;font-weight:600">
                    {{ username }}
                </div>

                <div style="color:#777;font-size:11px">
                    Free Plan
                </div>
            </div>
        </div>
    </div>

    <!-- Navigation -->
    <div style="display:flex;flex-direction:column;padding:0 12px;gap:4px;flex:1">

        <a href="/" style="padding:11px 14px;border-radius:10px;text-decoration:none;
       {% if page=='dashboard' %}
       background:#1b1206;color:#FF7A1A;font-weight:600;
       {% else %}
       color:#888;
       {% endif %}">
       📊 Dashboard
    </a>

        <a href="/tasks" style="padding:11px 14px;border-radius:10px;text-decoration:none;
       {% if page=='tasks' %}
       background:#1b1206;color:#FF7A1A;font-weight:600;
       {% else %}
       color:#888;
       {% endif %}">
       ✅ Tasks
    </a>

        <a href="/assistant" style="padding:11px 14px;border-radius:10px;text-decoration:none;
       {% if page=='assistant' %}
       background:#1b1206;color:#FF7A1A;font-weight:600;
       {% else %}
       color:#888;
       {% endif %}">
       🤖 AI Assistant
    </a>

        <a href="/calendar-view" style="padding:11px 14px;border-radius:10px;text-decoration:none;
       {% if page=='calendar' %}
       background:#1b1206;color:#FF7A1A;font-weight:600;
       {% else %}
       color:#888;
       {% endif %}">
       📅 Calendar
    </a>

        <a href="/analytics" style="padding:11px 14px;border-radius:10px;text-decoration:none;
       {% if page=='analytics' %}
       background:#1b1206;color:#FF7A1A;font-weight:600;
       {% else %}
       color:#888;
       {% endif %}">
       📈 Analytics
    </a>

    </div>

    <!-- Bottom -->
    <div style="padding:18px;border-top:1px solid #1e1e2a">

        <div id="urgency-score" style="display:none;background:#191319;border:1px solid #2d1b10;border-radius:10px;padding:12px;margin-bottom:14px">

            <div style="font-size:11px;color:#888;text-transform:uppercase">
                Urgency Score
            </div>

            <div id="urgency-num" style="font-size:24px;font-weight:700;color:#FF7A1A">
                --
            </div>

            <div style="height:5px;background:#25252d;border-radius:999px;margin-top:8px">
                <div id="urgency-bar" style="height:5px;width:0%;background:#FF7A1A;border-radius:999px;transition:.4s">
                </div>
            </div>

        </div>

        <a href="/logout" style="display:flex;align-items:center;gap:8px;text-decoration:none;color:#777;font-size:13px">
      🚪 Logout
    </a>

    </div>

</aside>

<script>
    async function loadUrgencyScore() {
        try {

            const res = await fetch("/api/tasks");

            if (!res.ok) return;

            const data = await res.json();

            if (!data.progress) return;

            const total = data.progress.total || 0;

            if (total === 0) return;

            const score = Math.round(
                ((total - data.progress.done) / total) * 100
            );

            document.getElementById("urgency-score").style.display = "block";
            document.getElementById("urgency-num").textContent = score;
            document.getElementById("urgency-bar").style.width = score + "%";

        } catch (e) {
            console.log(e);
        }
    }

    loadUrgencyScore();
</script>
