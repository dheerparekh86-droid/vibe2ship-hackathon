<nav style="
  width:220px;
  min-height:100vh;
  background:#0f0f14;
  border-right:1px solid #1e1e2a;
  display:flex;
  flex-direction:column;
  padding:20px 0;
  position:fixed;
  top:0;
  left:0;
">
  <div style="padding:0 20px 24px;border-bottom:1px solid #1e1e2a;margin-bottom:12px">
    <div style="display:flex;align-items:center;gap:10px">
      <div style="width:32px;height:32px;background:#FF7A1A;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px">⚡</div>
      <span style="color:#fff;font-size:15px;font-weight:600">DeadlineAI</span>
    </div>
  </div>

  <div style="padding:0 10px;display:flex;flex-direction:column;gap:4px">
    <a href="/" style="
      display:flex;align-items:center;gap:12px;
      padding:10px 12px;border-radius:8px;
      text-decoration:none;font-size:13px;font-weight:500;
      {% if page == 'dashboard' %}background:#1a1208;color:#FF7A1A;{% else %}color:#888;{% endif %}
    ">📊 Dashboard</a>

    <a href="/tasks" style="
      display:flex;align-items:center;gap:12px;
      padding:10px 12px;border-radius:8px;
      text-decoration:none;font-size:13px;font-weight:500;
      {% if page == 'tasks' %}background:#1a1208;color:#FF7A1A;{% else %}color:#888;{% endif %}
    ">✅ Tasks</a>

    <a href="/assistant" style="
      display:flex;align-items:center;gap:12px;
      padding:10px 12px;border-radius:8px;
      text-decoration:none;font-size:13px;font-weight:500;
      {% if page == 'assistant' %}background:#1a1208;color:#FF7A1A;{% else %}color:#888;{% endif %}
    ">🤖 AI Assistant</a>

    <a href="/calendar-view" style="
      display:flex;align-items:center;gap:12px;
      padding:10px 12px;border-radius:8px;
      text-decoration:none;font-size:13px;font-weight:500;
      {% if page == 'calendar' %}background:#1a1208;color:#FF7A1A;{% else %}color:#888;{% endif %}
    ">📅 Calendar</a>

    <a href="/analytics" style="
      display:flex;align-items:center;gap:12px;
      padding:10px 12px;border-radius:8px;
      text-decoration:none;font-size:13px;font-weight:500;
      {% if page == 'analytics' %}background:#1a1208;color:#FF7A1A;{% else %}color:#888;{% endif %}
    ">📈 Analytics</a>
  </div>

  <div style="margin-top:auto;padding:16px 20px;border-top:1px solid #1e1e2a">
    <div style="color:#fff;font-size:13px;font-weight:500;margin-bottom:8px">{{ username }}</div>
    <a href="/logout" style="color:#555;font-size:12px;text-decoration:none">Logout</a>
  </div>
</nav>
