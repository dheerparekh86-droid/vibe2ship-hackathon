<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora - AI Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .mic-btn {
            width: 42px;
            height: 42px;
            background: #15161A;
            border: 1px solid #1e1e2a;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.15s;
        }
        
        .mic-btn:hover {
            border-color: #FF7A1A;
        }
        
        .mic-btn.listening {
            background: #2a0a0a;
            border-color: #E24B4A;
            animation: mic-pulse 1s infinite;
        }
        
        @keyframes mic-pulse {
            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(226, 75, 74, 0.4);
            }
            50% {
                box-shadow: 0 0 0 8px rgba(226, 75, 74, 0);
            }
        }
        
        .read-btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-top: 8px;
            padding: 5px 12px;
            background: #0f1a1a;
            border: 1px solid #1a2e2e;
            border-radius: 6px;
            color: #22c9e0;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }
        
        .read-btn:hover {
            background: #1a2e2e;
        }
        
        .read-btn.speaking {
            background: #1a0808;
            border-color: #E24B4A;
            color: #E24B4A;
        }
        
        .mic-status {
            font-size: 12px;
            color: #E24B4A;
            text-align: center;
            padding: 4px;
            display: none;
        }
        
        .mic-status.show {
            display: block;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }
        
        body {
            background: #0B0B0F;
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            min-height: 100vh
        }
        
        .main {
            margin-left: 220px;
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh
        }
        
        .topbar {
            padding: 24px 32px 20px;
            border-bottom: 1px solid #1e1e2a
        }
        
        .topbar h1 {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 4px
        }
        
        .topbar p {
            font-size: 13px;
            color: #555
        }
        
        .live-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #1D9E75;
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse 2s infinite
        }
        
        @keyframes pulse {
            0%,
            100% {
                opacity: 1
            }
            50% {
                opacity: 0.4
            }
        }
        
        .quick-actions {
            display: flex;
            gap: 10px;
            padding: 16px 32px;
            border-bottom: 1px solid #1e1e2a;
            flex-wrap: wrap
        }
        
        .qa-btn {
            padding: 8px 16px;
            background: #15161A;
            border: 1px solid #1e1e2a;
            border-radius: 8px;
            color: #888;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s
        }
        
        .qa-btn:hover {
            border-color: #FF7A1A;
            color: #FF7A1A
        }
        
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px 32px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background-image: url('/static/assistant_bg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: local;
            position: relative;
        }
        
        .msg {
            max-width: 75%;
            padding: 14px 18px;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.7
        }
        
        .msg-ai {
            background: #15161A;
            border: 1px solid #1e1e2a;
            color: #ccc;
            align-self: flex-start;
            border-radius: 4px 14px 14px 14px
        }
        
        .msg-user {
            background: #FF7A1A;
            color: #fff;
            align-self: flex-end;
            border-radius: 14px 4px 14px 14px
        }
        
        .msg-time {
            font-size: 11px;
            color: #444;
            margin-top: 6px
        }
        
        .msg-ai .msg-time {
            color: #333
        }
        
        .ai-avatar {
            width: 28px;
            height: 28px;
            background: #1a1208;
            border: 1px solid #FF7A1A;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            margin-bottom: 6px
        }
        
        .input-area {
            padding: 20px 32px;
            border-top: 1px solid #1e1e2a;
            display: flex;
            gap: 12px;
            align-items: flex-end
        }
        
        .input-wrap {
            flex: 1;
            background: #15161A;
            border: 1px solid #1e1e2a;
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: border-color 0.15s
        }
        
        .input-wrap:focus-within {
            border-color: #FF7A1A
        }
        
        .input-wrap textarea {
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            resize: none;
            flex: 1;
            max-height: 120px;
            line-height: 1.5
        }
        
        .input-wrap textarea::placeholder {
            color: #444
        }
        
        .send-btn {
            width: 42px;
            height: 42px;
            background: #FF7A1A;
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.15s
        }
        
        .send-btn:hover {
            background: #e06a0f
        }
        
        .send-btn:disabled {
            background: #333;
            cursor: not-allowed
        }
        
        .typing {
            display: flex;
            gap: 4px;
            align-items: center;
            padding: 14px 18px;
            background: #15161A;
            border: 1px solid #1e1e2a;
            border-radius: 4px 14px 14px 14px;
            width: fit-content
        }
        
        .typing span {
            width: 6px;
            height: 6px;
            background: #555;
            border-radius: 50%;
            animation: bounce 1.2s infinite
        }
        
        .typing span:nth-child(2) {
            animation-delay: .2s
        }
        
        .typing span:nth-child(3) {
            animation-delay: .4s
        }
        
        @keyframes bounce {
            0%,
            100% {
                transform: translateY(0)
            }
            50% {
                transform: translateY(-4px)
            }
        }
        
        .welcome {
            text-align: center;
            padding: 40px 20px;
            color: #444
        }
        
        .welcome .icon {
            font-size: 48px;
            margin-bottom: 16px
        }
        
        .welcome h2 {
            font-size: 18px;
            color: #666;
            margin-bottom: 8px
        }
        
        .messages::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            pointer-events: none;
            z-index: 0;
        }
        
        .messages>* {
            position: relative;
            z-index: 1;
        }
        
        .plan-metrics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin: 12px 0;
            padding: 12px;
            background: #0f0f14;
            border-radius: 10px;
            border: 1px solid #1e1e2a;
        }
        
        .metric-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        
        .metric-label {
            font-size: 10px;
            color: #555;
            text-transform: uppercase;
            letter-spacing: .06em;
        }
        
        .metric-value {
            font-size: 15px;
            font-weight: 700;
            color: #fff;
        }
    </style>
</head>

<body>
    {% include 'sidebar.html' %}
    <main class="main">
        <div class="topbar">
            <h1>🤖 AI Assistant</h1>
            <p><span class="live-dot"></span>Your personal productivity co-pilot — powered by Gemini</p>
        </div>

        <div class="quick-actions">
            <button class="qa-btn" onclick="quickAction('Build me a rescue plan for the next 3 hours')">⚡ Rescue Mode</button>
            <button class="qa-btn" onclick="quickAction('Prioritize my current tasks and tell me what to do first')">🎯 Prioritize Tasks</button>
            <button class="qa-btn" onclick="quickAction('Build a realistic schedule for my entire week')">📅 Plan My Week</button>
            <button class="qa-btn" onclick="quickAction('I am feeling overwhelmed, help me find a starting point')">😰 I am Overwhelmed</button>
            <button class="qa-btn" onclick="openSlipModal()" style="border-color:#E24B4A;color:#E24B4A">⚠ Plan Slipped </button>
        </div>

        <div class="messages" id="messages">
            <div class="welcome">
                <div class="icon">🤖</div>
                <h2>Hey {{ username }}, what's on your plate?</h2>
                <p style="font-size:13px;margin-top:8px">Dump your tasks, deadlines, and stress. I'll build you a plan.</p>
            </div>
        </div>

        <div class="input-area">
            <button class="mic-btn" id="mic-btn" onclick="toggleSpeech()" title="Speak your situation">🎤</button>
            <div class="input-wrap">
                <textarea id="chat-input" placeholder="Tell me what you're dealing with... or click 🎤 to speak" rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
            </div>
            <button class="send-btn" id="send-btn" onclick="sendMessage()">→</button>
        </div>
        <div id="slip-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center">
            <div style="background:#131318;border:1px solid #1e1e2a;border-radius:16px;padding:28px;width:420px;max-width:95vw">
                <h3 style="font-size:16px;font-weight:700;margin-bottom:8px">⚠ What slipped?</h3>
                <p style="font-size:13px;color:#555;margin-bottom:16px">Tell me what changed and I'll rebuild your schedule from right now.</p>
                <textarea id="slip-input" style="width:100%;background:#0f0f14;border:1px solid #1e1e2a;border-radius:10px;padding:12px;color:#fff;font-size:13px;font-family:'Inter',sans-serif;resize:none;height:100px;outline:none" placeholder="e.g. Data Structures took 2 extra hours, now it's 9PM and I still have the quiz to revise..."></textarea>
                <div style="display:flex;gap:10px;margin-top:16px">
                    <button onclick="closeSlipModal()" style="flex:1;padding:11px;background:transparent;border:1px solid #1e1e2a;border-radius:8px;color:#888;font-size:13px;cursor:pointer">Cancel</button>
                    <button onclick="submitSlip()" style="flex:2;padding:11px;background:#FF7A1A;border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:700;cursor:pointer">Rebuild My Schedule →</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        let isLoading = false;

        function quickAction(text) {
            document.getElementById('chat-input').value = text;
            sendMessage();
        }

        function showTyping() {
            const msgs = document.getElementById('messages');
            const div = document.createElement('div');
            div.id = 'typing-indicator';
            div.innerHTML = `<div class="ai-avatar">⚡</div><div class="typing"><span></span><span></span><span></span></div>`;
            msgs.appendChild(div);
            msgs.scrollTop = msgs.scrollHeight;
        }

        function removeTyping() {
            const t = document.getElementById('typing-indicator');
            if (t) t.remove();
        }

        function escHtml(t) {
            return String(t).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function formatPlan(text) {
            let html = escHtml(text);
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/📅 (.*)/g, '<div style="color:#FF7A1A;font-weight:700;font-size:14px;margin:14px 0 6px">📅 $1</div>');
            html = html.replace(/🧠 (.*)/g, '<div style="color:#22c9e0;font-weight:700;font-size:14px;margin:14px 0 6px">🧠 $1</div>');
            html = html.replace(/⚠(.*)/g, '<div style="color:#E24B4A;font-size:13px;margin:4px 0">⚠$1</div>');
            html = html.replace(/✅(.*)/g, '<div style="color:#1D9E75;font-size:13px;margin:4px 0">✅$1</div>');
            html = html.replace(/💡(.*)/g, '<div style="color:#FF7A1A;font-size:13px;margin:4px 0">💡$1</div>');
            html = html.replace(/😴(.*)/g, '<div style="color:#6b5fa0;font-size:13px;margin:4px 0">😴$1</div>');
            html = html.replace(/🔥(.*)/g, '<div style="color:#E24B4A;font-size:13px;margin:4px 0">🔥$1</div>');
            html = html.replace(/📊(.*)/g, '<div style="color:#22c9e0;font-size:13px;margin:4px 0">📊$1</div>');
            html = html.replace(/➡(.*)/g, '<div style="color:#FF7A1A;font-size:13px;margin:4px 0">➡$1</div>');
            html = html.replace(/(\d{1,2}:\d{2}.*?)→(.*)/g, '<div style="display:flex;gap:8px;margin:3px 0;font-size:13px"><span style="color:#FF7A1A;min-width:80px;font-weight:600">$1</span><span style="color:#ccc">→$2</span></div>');
            html = html.replace(/\n/g, '<br>');
            return html;
        }

        function addMessage(text, isUser, metrics) {
            const msgs = document.getElementById('messages');
            const welcome = msgs.querySelector('.welcome');
            if (welcome) welcome.remove();

            const div = document.createElement('div');
            div.className = isUser ? 'msg msg-user' : '';

            const time = new Date().toLocaleTimeString([], {
                hour: '2-digit',
                minute: '2-digit'
            });

            if (isUser) {
                div.innerHTML = `${escHtml(text)}<div class="msg-time">${time}</div>`;
            } else {
                let metricsHTML = '';
                if (metrics) {
                    metricsHTML = `
            <div class="plan-metrics">
                <div class="metric-item">
                    <div class="metric-label">AI Workload Score</div>
                    <div class="metric-value" style="color:#FF7A1A">${metrics.workload}/10</div>
                </div>
                <div class="metric-item">
                    <div class="metric-label">Burnout Risk</div>
                    <div class="metric-value" style="color:${metrics.burnout==='High'?'#E24B4A':metrics.burnout==='Moderate'?'#FF7A1A':'#1D9E75'}">${metrics.burnout}</div>
                </div>
                <div class="metric-item">
                    <div class="metric-label">Total Work Hours</div>
                    <div class="metric-value" style="color:#22c9e0">${metrics.totalHours}h</div>
                </div>
                <div class="metric-item">
                    <div class="metric-label">Free Hours</div>
                    <div class="metric-value" style="color:#1D9E75">${metrics.freeHours}h</div>
                </div>
            </div>`;
                }
                const msgId = 'msg-' + Date.now();
                div.innerHTML = `
        <div class="ai-avatar">⚡</div>
        <div class="msg msg-ai" id="${msgId}">
            ${metricsHTML}${formatPlan(text)}
            <div style="display:flex;align-items:center;gap:8px;margin-top:10px;padding-top:8px;border-top:1px solid #1e1e2a">
                <button class="read-btn" id="read-btn-${msgId}" onclick="readAloud('${msgId}')">🔊 Read Aloud</button>
                <button class="read-btn" onclick="stopSpeaking()" style="border-color:#333;color:#555">⏹ Stop</button>
                <div class="msg-time" style="margin:0;margin-left:auto">${time}</div>
            </div>
        </div>`;
            }
            msgs.appendChild(div);
            msgs.scrollTop = msgs.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text || isLoading) return;

            isLoading = true;
            input.value = '';
            input.style.height = 'auto';
            document.getElementById('send-btn').disabled = true;

            addMessage(text, true);
            showTyping();

            try {
                const r = await fetch('/api/plan', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        input: text
                    })
                });
                const d = await r.json();
                removeTyping();
                if (d.error) {
                    addMessage('Something went wrong: ' + d.error, false, null);
                } else {
                    const plan = d.plan || '';
                    const hoursMatch = plan.match(/(?:total work estimated|estimated[:\s]+)[\s:]*(\d+\.?\d*)\s*hours?/i) ||
                        plan.match(/(\d+\.?\d*)\s*hours?\s*(?:estimated|total|of work)/i);
                    const freeMatch = plan.match(/(?:free|available)[\s\w]*:?\s*(\d+\.?\d*)\s*hours?/i) ||
                        plan.match(/(\d+\.?\d*)\s*(?:free|available)\s*hours?/i);
                    const burnoutMatch = plan.match(/[Bb]urnout\s*[Rr]isk[:\s]*(Low|Moderate|High)/i) ||
                        plan.match(/[Bb]urnout[:\s]*(Low|Moderate|High)/i);
                    const workloadMatch = plan.match(/(\d+\.?\d*)\/10/) ||
                        plan.match(/[Ww]orkload\s*[Ss]core[:\s]*(\d+\.?\d*)/i);
                    const totalHoursNum = hoursMatch ? parseFloat(hoursMatch[1]) : null;
                    const freeHoursCalc = totalHoursNum ? Math.max(0, (7 * 16) - totalHoursNum).toFixed(1) : '?';
                    const metrics = {
                        workload: workloadMatch ? workloadMatch[1] : '?',
                        burnout: burnoutMatch ? burnoutMatch[1] : '?',
                        totalHours: hoursMatch ? hoursMatch[1] : '?',
                        freeHours: freeMatch ? freeMatch[1] : freeHoursCalc
                    };
                    const hasMetrics = workloadMatch || burnoutMatch || hoursMatch;
                    window.__lastPlan = plan;
                    addMessage(plan, false, hasMetrics ? metrics : null);
                }
            } catch (e) {
                removeTyping();
                addMessage('Connection error. Please try again.', false, null);
            }

            isLoading = false;
            document.getElementById('send-btn').disabled = false;
            input.focus();
        }

        function openSlipModal() {
            document.getElementById('slip-modal').style.display = 'flex';
            document.getElementById('slip-input').focus();
        }

        function closeSlipModal() {
            document.getElementById('slip-modal').style.display = 'none';
        }

        async function submitSlip() {
            const slipText = document.getElementById('slip-input').value.trim();
            if (!slipText) return;
            closeSlipModal();
            const now = new Date().toLocaleTimeString([], {
                hour: '2-digit',
                minute: '2-digit'
            });
            const currentPlan = window.__lastPlan || '';
            addMessage(`⚠ Plan slipped: ${slipText}`, true, null);
            showTyping();
            try {
                const r = await fetch('/api/reschedule', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        original_plan: currentPlan,
                        update: slipText
                    })
                });
                const d = await r.json();
                removeTyping();
                if (d.error) {
                    addMessage('Could not reschedule: ' + d.error, false, null);
                } else {
                    window.__lastPlan = d.plan;
                    addMessage(d.plan, false, null);
                    addMessage('📋 Tasks and calendar updated with your new schedule.', false, null);
                }
            } catch (e) {
                removeTyping();
                addMessage('Connection error. Try again.', false, null);
            }
        }

        // ── SPEECH RECOGNITION ──
        let recognition = null;
        let isListening = false;

        function toggleSpeech() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                alert('Speech recognition not supported. Try Chrome.');
                return;
            }
            isListening ? stopListening() : startListening();
        }

        function startListening() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'en-US';
            const micBtn = document.getElementById('mic-btn');
            const input = document.getElementById('chat-input');
            recognition.onstart = () => {
                isListening = true;
                micBtn.classList.add('listening');
                micBtn.textContent = '🔴';
                showMicStatus('Listening... speak your situation');
            };
            recognition.onresult = (event) => {
                let final = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    if (event.results[i].isFinal) final += event.results[i][0].transcript;
                }
                if (final) {
                    input.value += final;
                    input.style.height = 'auto';
                    input.style.height = input.scrollHeight + 'px';
                }
            };
            recognition.onerror = (e) => {
                stopListening();
                if (e.error !== 'no-speech') showMicStatus('Error: ' + e.error, true);
            };
            recognition.onend = () => stopListening();
            recognition.start();
        }

        function stopListening() {
            isListening = false;
            const micBtn = document.getElementById('mic-btn');
            micBtn.classList.remove('listening');
            micBtn.textContent = '🎤';
            hideMicStatus();
            if (recognition) {
                recognition.stop();
                recognition = null;
            }
        }

        function showMicStatus(msg, isError) {
            let el = document.getElementById('mic-status');
            if (!el) {
                el = document.createElement('div');
                el.id = 'mic-status';
                el.className = 'mic-status';
                document.querySelector('.input-area').before(el);
            }
            el.textContent = msg;
            el.style.color = isError ? '#E24B4A' : '#22c9e0';
            el.classList.add('show');
        }

        function hideMicStatus() {
            const el = document.getElementById('mic-status');
            if (el) el.classList.remove('show');
        }

        // ── TEXT TO SPEECH ──
        let currentUtterance = null;
        let isSpeaking = false;

        function readAloud(msgId) {
            const msgEl = document.getElementById(msgId);
            if (!msgEl) return;
            const rawText = msgEl.innerText || msgEl.textContent;
            const cleanText = rawText.replace('🔊 Read Aloud', '').replace('⏹ Stop', '').replace(/\s+/g, ' ').trim();
            if (!cleanText) return;
            stopSpeaking();
            const btn = document.getElementById('read-btn-' + msgId);
            currentUtterance = new SpeechSynthesisUtterance(cleanText);
            currentUtterance.rate = 0.95;
            currentUtterance.pitch = 1.0;
            currentUtterance.volume = 1.0;
            const voices = window.speechSynthesis.getVoices();
            const preferred = voices.find(v => v.name.includes('Google') || v.lang === 'en-US');
            if (preferred) currentUtterance.voice = preferred;
            currentUtterance.onstart = () => {
                isSpeaking = true;
                if (btn) {
                    btn.textContent = '🔊 Speaking...';
                    btn.classList.add('speaking');
                }
            };
            currentUtterance.onend = () => {
                isSpeaking = false;
                if (btn) {
                    btn.textContent = '🔊 Read Aloud';
                    btn.classList.remove('speaking');
                }
                currentUtterance = null;
            };
            currentUtterance.onerror = () => {
                isSpeaking = false;
                if (btn) {
                    btn.textContent = '🔊 Read Aloud';
                    btn.classList.remove('speaking');
                }
                currentUtterance = null;
            };
            window.speechSynthesis.speak(currentUtterance);
        }

        function stopSpeaking() {
            if (window.speechSynthesis.speaking) window.speechSynthesis.cancel();
            isSpeaking = false;
            currentUtterance = null;
            document.querySelectorAll('.read-btn').forEach(btn => {
                if (btn.textContent.includes('Speaking')) {
                    btn.textContent = '🔊 Read Aloud';
                    btn.classList.remove('speaking');
                }
            });
        }

        window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    </script>
</body>

</html>
