<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeadlineAI - AI Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0B0B0F;color:#fff;font-family:'Inter',sans-serif;display:flex;min-height:100vh}
    .main{margin-left:220px;flex:1;display:flex;flex-direction:column;height:100vh}
    .topbar{padding:24px 32px 20px;border-bottom:1px solid #1e1e2a}
    .topbar h1{font-size:22px;font-weight:700;color:#fff;margin-bottom:4px}
    .topbar p{font-size:13px;color:#555}
    .live-dot{display:inline-block;width:8px;height:8px;background:#1D9E75;border-radius:50%;margin-right:6px;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
    .quick-actions{display:flex;gap:10px;padding:16px 32px;border-bottom:1px solid #1e1e2a;flex-wrap:wrap}
    .qa-btn{padding:8px 16px;background:#15161A;border:1px solid #1e1e2a;border-radius:8px;color:#888;font-size:12px;font-weight:500;cursor:pointer;transition:all 0.15s}
    .qa-btn:hover{border-color:#FF7A1A;color:#FF7A1A}
    .messages{flex:1;overflow-y:auto;padding:24px 32px;display:flex;flex-direction:column;gap:16px}
    .msg{max-width:75%;padding:14px 18px;border-radius:14px;font-size:14px;line-height:1.7}
    .msg-ai{background:#15161A;border:1px solid #1e1e2a;color:#ccc;align-self:flex-start;border-radius:4px 14px 14px 14px}
    .msg-user{background:#FF7A1A;color:#fff;align-self:flex-end;border-radius:14px 4px 14px 14px}
    .msg-time{font-size:11px;color:#444;margin-top:6px}
    .msg-ai .msg-time{color:#333}
    .ai-avatar{width:28px;height:28px;background:#1a1208;border:1px solid #FF7A1A;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;margin-bottom:6px}
    .input-area{padding:20px 32px;border-top:1px solid #1e1e2a;display:flex;gap:12px;align-items:flex-end}
    .input-wrap{flex:1;background:#15161A;border:1px solid #1e1e2a;border-radius:12px;padding:12px 16px;display:flex;align-items:center;gap:10px;transition:border-color 0.15s}
    .input-wrap:focus-within{border-color:#FF7A1A}
    .input-wrap textarea{background:transparent;border:none;outline:none;color:#fff;font-size:14px;font-family:'Inter',sans-serif;resize:none;flex:1;max-height:120px;line-height:1.5}
    .input-wrap textarea::placeholder{color:#444}
    .send-btn{width:42px;height:42px;background:#FF7A1A;border:none;border-radius:10px;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s}
    .send-btn:hover{background:#e06a0f}
    .send-btn:disabled{background:#333;cursor:not-allowed}
    .typing{display:flex;gap:4px;align-items:center;padding:14px 18px;background:#15161A;border:1px solid #1e1e2a;border-radius:4px 14px 14px 14px;width:fit-content}
    .typing span{width:6px;height:6px;background:#555;border-radius:50%;animation:bounce 1.2s infinite}
    .typing span:nth-child(2){animation-delay:.2s}
    .typing span:nth-child(3){animation-delay:.4s}
    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
    .welcome{text-align:center;padding:40px 20px;color:#444}
    .welcome .icon{font-size:48px;margin-bottom:16px}
    .welcome h2{font-size:18px;color:#666;margin-bottom:8px}
  </style>
</head>
<body>
{% include 'sidebar.html' %}
<main class="main">
  <div class="topbar">
    <h1>🤖 AI Assistant</h1>
    <p><span class="live-dot"></span>Your personal productivity co-pilot — powered by Gemini</p>
  </div>

  <div class="quick-actions">
    <button class="qa-btn" onclick="quickAction('Build me a rescue plan for the next 3 hours')">⚡ Rescue Mode</button>
    <button class="qa-btn" onclick="quickAction('Prioritize my current tasks and tell me what to do first')">🎯 Prioritize Tasks</button>
    <button class="qa-btn" onclick="quickAction('Build a realistic schedule for my entire week')">📅 Plan My Week</button>
    <button class="qa-btn" onclick="quickAction('I am feeling overwhelmed, help me find a starting point')">😰 I am Overwhelmed</button>
  </div>

  <div class="messages" id="messages">
    <div class="welcome">
      <div class="icon">🤖</div>
      <h2>Hey {{ username }}, what's on your plate?</h2>
      <p style="font-size:13px;margin-top:8px">Dump your tasks, deadlines, and stress. I'll build you a plan.</p>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="chat-input" placeholder="Tell me what you're dealing with..." rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"
        oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
    </div>
    <button class="send-btn" id="send-btn" onclick="sendMessage()">→</button>
  </div>
</main>

<script>
let isLoading = false;

function quickAction(text) {
  document.getElementById('chat-input').value = text;
  sendMessage();
}

function addMessage(text, isUser) {
  const msgs = document.getElementById('messages');
  const welcome = msgs.querySelector('.welcome');
  if (welcome) welcome.remove();

  const div = document.createElement('div');
  div.className = isUser ? 'msg msg-user' : '';

  const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

  if (isUser) {
    div.innerHTML = `${escHtml(text)}<div class="msg-time">${time}</div>`;
  } else {
    div.innerHTML = `
      <div class="ai-avatar">⚡</div>
      <div class="msg msg-ai">${formatPlan(text)}<div class="msg-time">${time}</div></div>`;
  }
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.id = 'typing-indicator';
  div.innerHTML = `<div class="ai-avatar">⚡</div><div class="typing"><span></span><span></span><span></span></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

function formatPlan(text) {
  return escHtml(text).replace(/\n/g, '<br>');
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || isLoading) return;

  isLoading = true;
  input.value = '';
  input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;

  addMessage(text, true);
  showTyping();

  try {
    const r = await fetch('/api/plan', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({input: text})
    });
    const d = await r.json();
    removeTyping();
    if (d.error) {
      addMessage('Something went wrong: ' + d.error, false);
    } else {
      addMessage(d.plan, false);
    }
  } catch(e) {
    removeTyping();
    addMessage('Connection error. Please try again.', false);
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
  input.focus();
}

function escHtml(t) {
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
